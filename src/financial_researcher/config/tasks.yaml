research_task:
  description: >
    Conduct thorough research on company {company}. Focus on:
    1. Current company status and health
    2. Historical company performance
    3. Major challenges and opportunities
    4. Recent news and events
    5. Future outlook and potential developments
    6. Use the Stock Financial Data Lookup tool with ticker symbol {ticker} to
       retrieve accurate, real-time quantitative data (current price, market cap,
       P/E ratio, 52-week range) and include these exact figures in your findings.

    Make sure to organize your findings in a structured format with clear sections.
  expected_output: >
    A comprehensive research document with well-organized sections covering
    all the requested aspects of {company}. Include specific facts, figures,
    and examples where relevant.
  agent: researcher

analysis_task:
  description: >
    Analyze the research findings and create a comprehensive report on {company}.
    Your report should:
    1. Begin with an executive summary
    2. Include all key information from the research
    3. Provide insightful analysis of trends and patterns
    4. Offer a market outlook for the company
    5. Be formatted in a professional, easy-to-read style with clear headings

    You must also include a clear, substantive disclaimer stating that this report
    is for informational purposes only and should not be used as the basis for
    trading or investment decisions.
  expected_output: >
    A structured report on {company} including an executive summary, current status,
    historical performance, challenges and opportunities, recent news, future outlook,
    and a mandatory disclaimer explaining the report should not be used for trading decisions.
  agent: analyst
  context:
    - research_task